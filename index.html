<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GBA Style - Painted Background Prototype</title>
  <style>
    body {
      background-color: #121212;
      color: #888;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    canvas {
      width: 720px;
      height: 480px;
      image-rendering: pixelated;
      border: 8px solid #333;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }

    .ui-hint {
      margin-top: 15px;
      font-size: 12px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<canvas id="screen" width="240" height="160"></canvas>
<div class="ui-hint">ARROWS TO NAVIGATE // C TO TOGGLE COLLISION</div>

<script>
  const canvas = document.getElementById('screen');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const TILE = 16;
  const WALK_DURATION = 180;
  const SCREEN_W = 240;
  const SCREEN_H = 160;
  const MAP_W = 20;
  const MAP_H = 20;
  const WORLD_W = MAP_W * TILE;
  const WORLD_H = MAP_H * TILE;

  const bgImage = new Image();
  bgImage.src = 'BG.png';

  const spriteSheet = new Image();
  spriteSheet.src = 'GK.png';

  // 0 = walkable
  // 2 = blocked
  // Best-fit to current BG.png
  const collisionMap = [
    '22222222200222222222',
    '20000000000000000002',
    '20000000000000000002',
    '20000000000000220002',
    '20222222222200220002',
    '20222222222200000002',
    '20002222222202222002',
    '20002222222202200002',
    '20002200222200000002',
    '20000000000000000002',
    '20000000000000000002',
    '20220000000000002202',
    '20220000000000002202',
    '20000000000000000002',
    '20000220000002200002',
    '20000220000002200002',
    '20000000000000000002',
    '20000000000000000002',
    '20000000000000000002',
    '22222222200222222222'
  ];

  const player = {
    gx: 9,
    gy: 11,
    isMoving: false,
    moveProg: 0,
    dir: { x: 0, y: 0 },
    facing: 'down'
  };

  const keys = {};
  let showCollision = false;

  window.addEventListener('keydown', (e) => {
    keys[e.code] = true;

    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space', 'KeyC'].includes(e.code)) {
      e.preventDefault();
    }

    if (e.code === 'KeyC') {
      showCollision = !showCollision;
    }
  });

  window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
  });

  let frameW = 0;
  let frameH = 0;
  const SHEET_COLS = 4;
  const SHEET_ROWS = 2;

  // 0 down idle
  // 1 down walk
  // 2 left idle
  // 3 left walk
  // 4 right idle
  // 5 right walk
  // 6 up idle
  // 7 up walk
  const FRAME_MAP = {
    down: [0, 1],
    left: [2, 3],
    right: [4, 5],
    up: [6, 7]
  };

  function tileAt(x, y) {
    if (x < 0 || y < 0 || x >= MAP_W || y >= MAP_H) return 2;
    return Number(collisionMap[y][x]);
  }

  function blocked(x, y) {
    return tileAt(x, y) === 2;
  }

  function drawPlayerSprite(px, py, facing, walkFrame) {
    if (!frameW || !frameH) return;

    const frameIndex = FRAME_MAP[facing][walkFrame];
    const sx = (frameIndex % SHEET_COLS) * frameW;
    const sy = Math.floor(frameIndex / SHEET_COLS) * frameH;

    const targetW = 24;
    const targetH = 32;
    const drawX = Math.floor(px - targetW / 2 + TILE / 2);
    const drawY = Math.floor(py - targetH + TILE + 2);

    ctx.drawImage(
      spriteSheet,
      sx, sy, frameW, frameH,
      drawX, drawY, targetW, targetH
    );
  }

  function update(dt) {
    if (!player.isMoving) {
      let dx = 0;
      let dy = 0;

      if (keys['ArrowUp']) {
        dy = -1;
        player.facing = 'up';
      } else if (keys['ArrowDown']) {
        dy = 1;
        player.facing = 'down';
      } else if (keys['ArrowLeft']) {
        dx = -1;
        player.facing = 'left';
      } else if (keys['ArrowRight']) {
        dx = 1;
        player.facing = 'right';
      }

      if (dx !== 0 || dy !== 0) {
        const tx = player.gx + dx;
        const ty = player.gy + dy;

        if (!blocked(tx, ty)) {
          player.isMoving = true;
          player.dir = { x: dx, y: dy };
          player.moveProg = 0;
        }
      }
    } else {
      player.moveProg += dt;
      if (player.moveProg >= WALK_DURATION) {
        player.gx += player.dir.x;
        player.gy += player.dir.y;
        player.isMoving = false;
        player.moveProg = 0;
      }
    }
  }

  function getCamera() {
    const lerp = player.isMoving ? Math.min(1, player.moveProg / WALK_DURATION) : 0;

    const worldPlayerX = (player.gx + player.dir.x * lerp) * TILE + TILE / 2;
    const worldPlayerY = (player.gy + player.dir.y * lerp) * TILE + TILE / 2;

    let camX = Math.floor(worldPlayerX - SCREEN_W / 2);
    let camY = Math.floor(worldPlayerY - SCREEN_H / 2);

    camX = Math.max(0, Math.min(camX, WORLD_W - SCREEN_W));
    camY = Math.max(0, Math.min(camY, WORLD_H - SCREEN_H));

    return { camX, camY, lerp };
  }

  function drawBackground(camX, camY) {
    const srcX = (camX / WORLD_W) * bgImage.width;
    const srcY = (camY / WORLD_H) * bgImage.height;
    const srcW = (SCREEN_W / WORLD_W) * bgImage.width;
    const srcH = (SCREEN_H / WORLD_H) * bgImage.height;

    ctx.drawImage(
      bgImage,
      Math.floor(srcX),
      Math.floor(srcY),
      Math.ceil(srcW),
      Math.ceil(srcH),
      0,
      0,
      SCREEN_W,
      SCREEN_H
    );
  }

  function drawCollisionOverlay(camX, camY) {
    if (!showCollision) return;

    for (let y = 0; y < MAP_H; y++) {
      for (let x = 0; x < MAP_W; x++) {
        if (tileAt(x, y) !== 2) continue;

        const sx = x * TILE - camX;
        const sy = y * TILE - camY;

        if (sx < -TILE || sy < -TILE || sx > SCREEN_W || sy > SCREEN_H) continue;

        ctx.fillStyle = 'rgba(255, 0, 0, 0.28)';
        ctx.fillRect(sx, sy, TILE, TILE);
      }
    }
  }

  function render() {
    const { camX, camY, lerp } = getCamera();

    ctx.clearRect(0, 0, SCREEN_W, SCREEN_H);
    drawBackground(camX, camY);

    const playerWorldX = (player.gx + player.dir.x * lerp) * TILE;
    const playerWorldY = (player.gy + player.dir.y * lerp) * TILE;
    const playerScreenX = playerWorldX - camX;
    const playerScreenY = playerWorldY - camY;

    const pFrame = (player.isMoving && player.moveProg > WALK_DURATION / 2) ? 1 : 0;
    drawPlayerSprite(playerScreenX, playerScreenY, player.facing, pFrame);

    drawCollisionOverlay(camX, camY);
  }

  let last = 0;
  let loaded = 0;

  function assetLoaded() {
    loaded++;
    if (loaded === 2) {
      frameW = Math.floor(spriteSheet.width / SHEET_COLS);
      frameH = Math.floor(spriteSheet.height / SHEET_ROWS);
      requestAnimationFrame(loop);
    }
  }

  bgImage.onload = assetLoaded;
  spriteSheet.onload = assetLoaded;

  function loop(now) {
    const dt = now - last;
    last = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }
</script>

</body>
</html>
